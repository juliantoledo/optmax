<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 512px; height: 512px; background: #0D1321; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
  <svg width="400" height="400" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="g" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="#38BDF8"/>
        <stop offset="50%"  stop-color="#818CF8"/>
        <stop offset="100%" stop-color="#C084FC"/>
      </linearGradient>
    </defs>
    <!-- Bar 1 (short, left) -->
    <rect x="3"  y="64" width="22" height="32" rx="5" fill="url(#g)"/>
    <!-- Bar 2 (medium, center) -->
    <rect x="36" y="42" width="22" height="54" rx="5" fill="url(#g)"/>
    <!-- Bar 3 (tall, right) -->
    <rect x="69" y="26" width="22" height="70" rx="5" fill="url(#g)"/>
    <!-- Arrow shaft -->
    <line x1="14" y1="82" x2="87" y2="12" stroke="url(#g)" stroke-width="11" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="96,4 91,8 83,16" fill="url(#g)"/>
  </svg>
</body>
</html>
