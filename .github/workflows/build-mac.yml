name: Build Mac Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload to (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-mac:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Mac DMG
        run: npx electron-builder --mac --publish never

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(ls dist/*.dmg | head -1)
          echo "Uploading $DMG"
          gh release upload ${{ github.event.inputs.tag }} "$DMG" --clobber
