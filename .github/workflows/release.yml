name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --draft \
            --title "OptMax ${{ github.ref_name }}" \
            --notes "Release OptMax ${{ github.ref_name }}" \
            --repo ${{ github.repository }} \
            || echo "Release already exists"

  build:
    name: Build (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build -- --publish never

      - name: Upload artifacts to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find dist -maxdepth 1 -type f \( \
            -name "*.exe" -o -name "*.exe.blockmap" -o \
            -name "*.dmg" -o -name "*.dmg.blockmap" -o \
            -name "*.AppImage" -o \
            -name "latest*.yml" \
          \) -print0 | xargs -0 gh release upload ${{ github.ref_name }} --clobber
